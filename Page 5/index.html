<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryvon – When Are You Planning to Implement AI?</title>
  <meta name="description" content="Step 3 of 3 — Tell Ryvon your timeline and budget for AI implementation." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===== Background ===== -->
  <div class="bg-container">
    <img src="asset/Welcome page 29.png" alt="Background gradient" />
  </div>

  <!-- ===== Header / Navigation ===== -->
  <header class="header" data-node-id="1:255">
    <div class="logo" data-node-id="1:256">
      <img src="./asset/Union.svg" alt="Ryvon icon" class="logo-icon" />
      <img src="./asset/Line 257.svg" alt="" class="logo-separator" />
      <span class="logo-text">RYVON</span>
    </div>

    <nav>
      <ul class="nav-links" data-node-id="1:263">
        <li data-node-id="1:264"><a href="#home">Home</a></li>
        <li data-node-id="1:265"><a href="#about">About</a></li>
        <li data-node-id="1:266"><a href="#product">Product</a></li>
        <li data-node-id="1:267"><a href="#features">Features</a></li>
      </ul>
    </nav>

    <button class="btn-waitlist" data-node-id="1:268">
      <span class="btn-waitlist__label">Join Waitlist</span>
      <span class="btn-waitlist__glow"></span>
    </button>
  </header>

  <!-- ===== Back Button ===== -->
  <a href="../Page 4/index.html" class="back-btn" data-node-id="1:270">← back</a>

  <!-- ===== Main Content ===== -->
  <main class="main-content" data-node-id="1:231">

    <!-- Step Label -->
    <p class="step-label" data-node-id="1:232">Step 03/03</p>

    <!-- Form Card -->
    <div class="form-card" data-node-id="1:233">

      <!-- Section 1: Timeline -->
      <p class="form-title" data-node-id="1:234">When are you planning to implement AI ?</p>

      <div class="options-grid" data-node-id="1:235">
        <!-- Row 1 -->
        <label class="option-row" data-node-id="1:237">
          <input type="checkbox" name="timeline" value="immediately" />
          <span class="custom-checkbox"></span>
          <span class="option-label" data-node-id="1:239">Immediately</span>
        </label>
        <label class="option-row" data-node-id="1:240">
          <input type="checkbox" name="timeline" value="1-3-months" />
          <span class="custom-checkbox"></span>
          <span class="option-label" data-node-id="1:242">1-3 Months</span>
        </label>
      </div>

      <div class="options-grid" data-node-id="1:243">
        <!-- Row 2 -->
        <label class="option-row" data-node-id="1:244">
          <input type="checkbox" name="timeline" value="3-6-months" />
          <span class="custom-checkbox"></span>
          <span class="option-label" data-node-id="1:246">3-6 Months</span>
        </label>
        <label class="option-row" data-node-id="1:247">
          <input type="checkbox" name="timeline" value="exploring" />
          <span class="custom-checkbox"></span>
          <span class="option-label" data-node-id="1:249">Exploring</span>
        </label>
      </div>

      <!-- Section 2: Budget -->
      <p class="form-title" data-node-id="1:387">Budget range</p>

      <div class="options-grid" data-node-id="1:388">
        <label class="option-row" data-node-id="1:390">
          <input type="checkbox" name="budget" value="5k-10k" />
          <span class="custom-checkbox"></span>
          <span class="option-label" data-node-id="1:392">$5k-$10k (MVP)</span>
        </label>
        <label class="option-row" data-node-id="1:393">
          <input type="checkbox" name="budget" value="10k-50k" />
          <span class="custom-checkbox"></span>
          <span class="option-label" data-node-id="1:405">$10k-$50k (Standard)</span>
        </label>
      </div>

      <div class="options-grid centered" data-node-id="1:396">
        <label class="option-row" data-node-id="1:400">
          <input type="checkbox" name="budget" value="50k-plus" />
          <span class="custom-checkbox"></span>
          <span class="option-label" data-node-id="1:403">$50k+ (Enterprise)</span>
        </label>
      </div>
    </div>

    <!-- Next Button -->
    <a href="../Page 6/index.html" class="next-btn" data-node-id="1:250">
      <span data-node-id="1:252">Next</span>
      <span class="chevron" data-node-id="1:253">
        <img src="./asset/Chevron_Right_Duo.svg" alt="Chevron right" />
      </span>
    </a>
  </main>

  <!-- ===== Footer ===== -->
  <footer>
    <p class="footer-text" data-node-id="1:254">
      AI Bharat Expo - Connect with <span class="brand">Ryvon</span>
    </p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
