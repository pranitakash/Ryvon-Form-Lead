<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryvon – Request AI Consultation</title>
  <meta name="description"
    content="Step 1 of 3 — Let's get introduced. Fill in your details to request an AI consultation with Ryvon." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===== Background ===== -->
  <div class="bg-container">
    <img src="asset/Welcome page 29.png" alt="Background gradient" />
  </div>

  <!-- ===== Header / Navigation ===== -->
  <header class="header" data-node-id="1:164">
    <div class="logo" data-node-id="1:165">
      <img src="./asset/Union.svg" alt="Ryvon icon" class="logo-icon" />
      <img src="./asset/Line 257.svg" alt="" class="logo-separator" />
      <span class="logo-text">RYVON</span>
    </div>

    <nav>
      <ul class="nav-links" data-node-id="1:172">
        <li data-node-id="1:173"><a href="#home">Home</a></li>
        <li data-node-id="1:174"><a href="#about">About</a></li>
        <li data-node-id="1:175"><a href="#product">Product</a></li>
        <li data-node-id="1:176"><a href="#features">Features</a></li>
      </ul>
    </nav>

    <button class="btn-waitlist" data-node-id="1:177">
      <span class="btn-waitlist__label">Join Waitlist</span>
      <span class="btn-waitlist__glow"></span>
    </button>
  </header>

  <!-- ===== Main Content ===== -->
  <main class="main-content">

    <!-- Heading -->
    <h1 class="section-heading" data-node-id="1:138">Request AI Consultation</h1>

    <!-- Step Label -->
    <p class="step-label" data-node-id="1:139">Step 01/03</p>

    <!-- Form Card -->
    <div class="form-card" data-node-id="1:140">
      <p class="form-title" data-node-id="1:141">Let's Get Introduced</p>

      <div class="fields-group" data-node-id="1:142">
        <!-- Row 1: First + Last Name -->
        <div class="field-row two-col" data-node-id="1:143">
          <div class="input-field" data-node-id="1:144">
            <input type="text" placeholder="First Name" id="firstName" data-node-id="1:145" />
          </div>
          <div class="input-field" data-node-id="1:146">
            <input type="text" placeholder="Last Name" id="lastName" data-node-id="1:147" />
          </div>
        </div>

        <!-- Row 2: Company + Industry -->
        <div class="field-row two-col" data-node-id="1:148">
          <div class="input-field" data-node-id="1:149">
            <input type="text" placeholder="Company" id="company" data-node-id="1:150" />
          </div>
          <div class="input-field select-field" data-node-id="1:151">
            <select id="industry" data-node-id="1:152">
              <option value="" disabled selected>Industry</option>
              <option value="technology">Technology</option>
              <option value="healthcare">Healthcare</option>
              <option value="finance">Finance</option>
              <option value="education">Education</option>
              <option value="manufacturing">Manufacturing</option>
              <option value="retail">Retail</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <!-- Row 3: Email -->
        <div class="field-row" data-node-id="1:154">
          <div class="input-field full-width">
            <input type="email" placeholder="Email" id="email" data-node-id="1:155" />
          </div>
        </div>

        <!-- Row 4: Phone -->
        <div class="field-row" data-node-id="1:156">
          <div class="input-field full-width">
            <input type="tel" placeholder="Phone Number" id="phone" data-node-id="1:157" />
          </div>
        </div>
      </div>
    </div>

    <!-- Next Button -->
    <a href="../Page 4/index.html" class="next-btn" data-node-id="1:158">
      <span data-node-id="1:160">Next</span>
      <span class="chevron" data-node-id="1:161">
        <img src="./asset/Chevron_Right_Duo.svg" alt="Chevron right" />
      </span>
    </a>

    <!-- Body text -->
    <p class="body-text" data-node-id="1:162">
      Tell us about your company and we'll explore how AI can help grow your business.
    </p>
  </main>

  <!-- ===== Footer ===== -->
  <footer>
    <p class="footer-text" data-node-id="1:163">
      AI Bharat Expo - Connect with <span class="brand">Ryvon</span>
    </p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
